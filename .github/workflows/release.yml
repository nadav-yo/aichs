name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "PEP 440 version to release, without the leading v"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Bump version and tag release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Qt libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libxcb1 \
            libxcb-cursor0 \
            xvfb

      - name: Install dependencies
        run: python -m pip install --upgrade pip packaging && pip install -r requirements-dev.txt

      - name: Check release ref
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "${REF_TYPE}" != "branch" ]; then
            echo "Run release.yml from the branch you want to release, not from ${REF_TYPE} ${REF_NAME}." >&2
            exit 1
          fi

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import os
          import sys

          from packaging.version import InvalidVersion, Version

          raw = os.environ["VERSION"].strip()
          if raw.startswith("v"):
              print("Pass the version without the leading v.", file=sys.stderr)
              sys.exit(1)
          try:
              version = Version(raw)
          except InvalidVersion as exc:
              print(f"Invalid PEP 440 version: {raw} ({exc})", file=sys.stderr)
              sys.exit(1)
          if version.local:
              print("Local versions are not suitable for PyPI releases.", file=sys.stderr)
              sys.exit(1)
          if str(version) != raw:
              print(f"Use the normalized version spelling: {version}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Check tag is unused
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git fetch --tags --force
          tag="v${VERSION}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists." >&2
            exit 1
          fi

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q --cov-fail-under=90

      - name: Update pyproject version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import sys

          version = os.environ["VERSION"].strip()
          path = pathlib.Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          pattern = re.compile(r'(?m)^(version\s*=\s*)"[^"]+"')
          updated, count = pattern.subn(rf'\1"{version}"', text, count=1)
          if count != 1:
              print("Could not find project version in pyproject.toml.", file=sys.stderr)
              sys.exit(1)
          path.write_text(updated, encoding="utf-8")
          PY

      - name: Commit, tag, and push
        env:
          VERSION: ${{ inputs.version }}
          BRANCH: ${{ github.ref_name }}
        run: |
          tag="v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "Release version ${VERSION}"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "HEAD:${BRANCH}"
          git push origin "${tag}"
